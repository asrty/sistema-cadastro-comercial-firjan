<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Vendedor</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="scripts/padrao.js"></script>
</head>
<body>

    <main class="container">
        <form class="formulario" action="/cadastrar-vendedor" method="POST">
            <h1>Cadastrar Vendedor</h1>

            <label for="nome">Nome do vendedor</label>
            <input type="text" id="nome" name="nome" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" required onclick="formatarCPF(this)">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required>

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" >

            <label for="matricula">Matricula</label>
            <input type="text" id="matricula" name="matricula" >

            <label for="setor">Setor</label>
            <input type="text" id="setor" name="setor">

            <label for="comissão">Comissão</label>
            <input type="text" id="comissao_visivel" >
            <input type="hidden" id="comissao_banco" name="comissao">

            <button type="submit">Salvar</button>
        </form>
    </main>


<script>
    const parametros = new URLSearchParams(window.location.search);

    if (parametros.get("sucesso") === "true") {
        alert("Vendedor(a) cadastrado com sucesso!");
    }
</script>
</body>
</html>
